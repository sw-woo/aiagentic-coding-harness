      - heading "Vibe coding 의 진짜 의미" [level=2] [ref=e70]
      - paragraph [ref=e71]: 2025년 2월 Karpathy 는 트위터에서 “vibe coding” 이라는 표현을 썼습니다. 원래 의도는 “LLM 을 옆에 두고 즉흥적으로 프로토타입을 만드는 즐거움” 을 묘사한 것이었습니다. 그러나 표현이 빠르게 확산되면서 “계획·검증·리뷰 없이 LLM 출력을 그대로 commit” 하는 행동까지 같은 이름으로 포장되는 부작용이 생겼습니다.
      - paragraph [ref=e72]: Karpathy 자신은 vibe coding 을 production 시스템의 권장 방법론으로 제시한 적이 없습니다. 즉흥성이 즐거움의 본질이지만, 같은 즉흥성이 production 의 사고로 이어지면 다른 이름이 필요합니다. 진지한 에이전틱 코딩 하네스(이 사이트가 견본으로 보여드리는 그것) 는 vibe coding 의 즉흥성과 검증 가능한 엔지니어링 사이의 차이를 명시적으로 다룹니다 — hooks, rules, eval loops, verification gates 가 그 답입니다.
      - complementary [ref=e73]:
        - img [ref=e74]
        - generic [ref=e76]:
          - paragraph [ref=e77]: vibe coding 과 진지한 하네스의 차이
          - generic [ref=e78]: vibe coding 은 빠른 프로토타입과 학습용으로는 훌륭합니다. 하지만 production 으로 가면 hooks(위험 명령 차단), rules(권한 정책), eval loops(자동 회귀 검증), verification gates(사실 기반 완료 선언) 가 반드시 필요합니다. 이 사이트의 카탈로그가 그 도구들의 살아있는 예시입니다.
      - heading "nanoGPT 의 단일 파일 미학" [level=2] [ref=e79]
      - paragraph [ref=e80]: Karpathy 의 또 다른 큰 영향은 “단일 파일·해킹 가능·교육적” 이라는 미학입니다. nanoGPT 는 약 300줄의 PyTorch 코드 한 파일로 GPT 를 재현하고, micrograd 는 약 100줄로 자동미분을 재현합니다. 두 저장소 모두 “이건 너무 작아서 거짓말이 끼어들 자리가 없다” 라는 메시지를 던집니다.
      - blockquote [ref=e81]:
        - generic [ref=e82]: nanoGPT — The simplest, fastest repository for training/finetuning medium-sized GPTs.
        - link "github.com/karpathy/nanoGPT ↗" [ref=e84] [cursor=pointer]:
          - /url: https://github.com/karpathy/nanoGPT
      - paragraph [ref=e85]: 이 미학은 이 사이트의 디자인에도 반영되어 있습니다. 사이트 자체가 자기 자신의 견본이고, 모든 페이지가 출처와 함께 짧고 정직하게 작성됩니다. “단순한 것 위에 사실을 쌓는다” 가 nanoGPT 의 메시지이고, 이 사이트의 메시지이기도 합니다.
