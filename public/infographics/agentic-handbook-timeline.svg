<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" rx="36" fill="#F7F7F2"/>
  <rect x="48" y="48" width="1504" height="804" rx="28" fill="#FFFFFF" stroke="#D9DEE8" stroke-width="2"/>
  <text x="96" y="130" fill="#111827" font-family="Arial, sans-serif" font-size="44" font-weight="700">Agentic Coding Handbook Timeline</text>
  <text x="96" y="172" fill="#4B5563" font-family="Arial, sans-serif" font-size="22">2017부터 2026까지: 패러다임 변화, 하네스 엔지니어링, 현재의 확장 스택</text>

  <line x1="120" y1="450" x2="1480" y2="450" stroke="#0042FF" stroke-width="8" stroke-linecap="round"/>

  <circle cx="200" cy="450" r="18" fill="#0042FF"/>
  <rect x="110" y="255" width="180" height="130" rx="20" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="136" y="300" fill="#0042FF" font-family="Arial, sans-serif" font-size="28" font-weight="700">2017</text>
  <text x="136" y="336" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">학습된 모델도</text>
  <text x="136" y="362" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">소프트웨어가 됨</text>
  <text x="136" y="392" fill="#4B5563" font-family="Arial, sans-serif" font-size="18">사람이 규칙을 다 쓰지 않아도</text>
  <text x="136" y="416" fill="#4B5563" font-family="Arial, sans-serif" font-size="18">학습된 모델이 기능을 수행</text>

  <circle cx="470" cy="450" r="18" fill="#0042FF"/>
  <rect x="380" y="520" width="180" height="134" rx="20" fill="#F5F3FF" stroke="#DDD6FE"/>
  <text x="406" y="565" fill="#6D28D9" font-family="Arial, sans-serif" font-size="28" font-weight="700">2023</text>
  <text x="406" y="601" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">모델보다</text>
  <text x="406" y="627" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">실행 환경이 중요</text>
  <text x="406" y="657" fill="#4B5563" font-family="Arial, sans-serif" font-size="18">프롬프트, 컨텍스트, 메모리,</text>
  <text x="406" y="681" fill="#4B5563" font-family="Arial, sans-serif" font-size="18">도구를 함께 관리</text>

  <circle cx="740" cy="450" r="18" fill="#0042FF"/>
  <rect x="650" y="255" width="180" height="142" rx="20" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="676" y="300" fill="#059669" font-family="Arial, sans-serif" font-size="28" font-weight="700">2024</text>
  <text x="676" y="336" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">복잡한 agent보다</text>
  <text x="676" y="362" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">단순 workflow가 나을 때</text>
  <text x="676" y="392" fill="#4B5563" font-family="Arial, sans-serif" font-size="18">어디에 agent를 쓰고</text>
  <text x="676" y="416" fill="#4B5563" font-family="Arial, sans-serif" font-size="18">어디는 단순화할지 구분</text>

  <circle cx="1010" cy="450" r="18" fill="#0042FF"/>
  <rect x="920" y="520" width="180" height="142" rx="20" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="946" y="565" fill="#EA580C" font-family="Arial, sans-serif" font-size="28" font-weight="700">2025</text>
  <text x="946" y="601" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">운영 기법이</text>
  <text x="946" y="627" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">하나의 묶음이 됨</text>
  <text x="946" y="657" fill="#4B5563" font-family="Arial, sans-serif" font-size="18">루프, 평가, 컨텍스트 관리,</text>
  <text x="946" y="681" fill="#4B5563" font-family="Arial, sans-serif" font-size="18">도구 연결이 함께 설계됨</text>

  <circle cx="1280" cy="450" r="18" fill="#0042FF"/>
  <rect x="1180" y="255" width="220" height="154" rx="20" fill="#F0F9FF" stroke="#BAE6FD"/>
  <text x="1208" y="300" fill="#0369A1" font-family="Arial, sans-serif" font-size="28" font-weight="700">2026</text>
  <text x="1208" y="336" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">지금은 모델보다</text>
  <text x="1208" y="362" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">하네스 전체가 중요</text>
  <text x="1208" y="392" fill="#4B5563" font-family="Arial, sans-serif" font-size="18">런타임, MCP, 검증,</text>
  <text x="1208" y="416" fill="#4B5563" font-family="Arial, sans-serif" font-size="18">관측성이 한 스택으로 묶임</text>

  <rect x="120" y="722" width="1360" height="94" rx="22" fill="#111827"/>
  <text x="154" y="772" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24" font-weight="700">핵심 메시지</text>
  <text x="154" y="806" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">좋은 agentic coding은 모델 이름 하나가 아니라 memory, skills, subagents, rules, hooks, evals, observability를 함께 설계하는 문제입니다.</text>
</svg>
